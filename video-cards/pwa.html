<!doctype html>
<meta charset="utf-8">
<style>
  *{margin:0;box-sizing:border-box}
  body{
    width:1920px;height:1200px;background:#17120D;
    background-image:radial-gradient(1400px 900px at 50% 42%, #241a11 0%, #17120D 70%);
    font-family:"Segoe UI",system-ui,sans-serif;color:#FBF5EA;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:40px;
  }
  .tile{
    width:270px;height:270px;border-radius:62px;
    background:linear-gradient(160deg,#2A2019,#17120D);
    border:1px solid #3A3327;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 30px 90px rgba(0,0,0,.6), inset 0 1px 0 rgba(251,245,234,.06);
  }
  .tile svg{width:150px;height:162px}
  .name{font-size:30px;font-weight:600;letter-spacing:.02em;margin-top:-16px}
  h1{font-size:56px;font-weight:650;margin-top:14px}
  .sub{font-size:26px;color:#A8957E;letter-spacing:.08em}
</style>
<body>
  <div class="tile">
    <svg viewBox="0 0 48 52">
      <g fill="none" stroke="#A8957E" stroke-width="1.6" stroke-linecap="round">
        <path d="M18 8 c -1.5 -2.5, 1.5 -4.5, 0 -7" opacity=".8"/>
        <path d="M27 9 c 1.5 -2.5, -1.5 -4.5, 0 -7" opacity=".6"/>
      </g>
      <path d="M7 20 C 7.5 33, 14 46, 24 46 C 34 46, 40.5 33, 41 20 Z" fill="#FBF5EA"/>
      <path d="M40 22 c 6.5 0.5, 6.5 12, -0.5 13" fill="none" stroke="#FBF5EA" stroke-width="2.2"/>
      <ellipse cx="24" cy="20" rx="17" ry="7" fill="#C2410C"/>
      <path d="M24 18.2 C 23 16.6, 20.6 16.2, 19.2 17.7 C 17.6 19.4, 18.8 21.2, 24 23.8 C 29.2 21.2, 30.4 19.4, 28.8 17.7 C 27.4 16.2, 25 16.6, 24 18.2 Z" fill="#FBF5EA"/>
    </svg>
  </div>
  <div class="name">Eficore</div>
  <h1>Instalable como app.</h1>
  <div class="sub">IPHONE · ANDROID · PC — SIN TIENDAS, SIN ACTUALIZACIONES</div>
</body>
