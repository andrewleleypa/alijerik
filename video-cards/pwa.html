<!doctype html>
<meta charset="utf-8">
<style>
  *{margin:0;box-sizing:border-box}
  body{
    width:1920px;height:1200px;background:#17120D;
    background-image:radial-gradient(1400px 900px at 50% 42%, #241a11 0%, #17120D 70%);
    font-family:"Segoe UI",system-ui,sans-serif;color:#FBF5EA;
    display:flex;align-items:center;justify-content:center;gap:110px;
  }
  .shot{
    width:400px;border-radius:28px;overflow:hidden;
    border:1px solid #3A3327;
    box-shadow:0 40px 110px rgba(0,0,0,.65);
  }
  .shot img{width:100%;display:block}
  .txt{display:flex;flex-direction:column;gap:18px;max-width:640px}
  .cap{font-size:22px;letter-spacing:.22em;color:#E8743C;font-weight:600}
  h1{font-size:62px;font-weight:650;line-height:1.1}
  .sub{font-size:26px;color:#A8957E;letter-spacing:.06em;line-height:1.5}
</style>
<body>
  <div class="shot"><img src="pwa-ios.jpeg" alt=""></div>
  <div class="txt">
    <div class="cap">// EN TU PANTALLA DE INICIO</div>
    <h1>Instalable como app.</h1>
    <div class="sub">iPhone, Android y PC — sin tiendas, sin actualizaciones. Así se ve en un iPhone real.</div>
  </div>
</body>
