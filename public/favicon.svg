<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Alijerik">
  <defs>
    <linearGradient id="ag" x1="12" y1="12" x2="52" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#18e3ff"/>
      <stop offset=".5" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#ff3d00"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="1.8"/>
    </filter>
  </defs>
  <!-- vacío profundo -->
  <circle cx="32" cy="32" r="31" fill="#05060a"/>
  <!-- halo del disco de acreción -->
  <circle cx="32" cy="32" r="19" fill="none" stroke="url(#ag)" stroke-width="8" opacity=".5" filter="url(#glow)"/>
  <!-- anillo nítido -->
  <circle cx="32" cy="32" r="19" fill="none" stroke="url(#ag)" stroke-width="5"/>
  <!-- horizonte de sucesos -->
  <circle cx="32" cy="32" r="11.5" fill="#05060a"/>
</svg>
